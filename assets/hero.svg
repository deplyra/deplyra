<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" width="1200" height="380" role="img" aria-label="Deplyra — DevOps &amp; Platform Engineering. Build it as code, ship it with GitOps, run it to SLOs.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1524"/>
      <stop offset="0.55" stop-color="#0E1B2A"/>
      <stop offset="1" stop-color="#081019"/>
    </linearGradient>
    <linearGradient id="teal2blue" x1="0" y1="1" x2="0.5" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#3D7DBF"/>
      <stop offset="1" stop-color="#53E8D4"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#EAF8FF"/>
      <stop offset="0.7" stop-color="#CDEFF6"/>
      <stop offset="1" stop-color="#7FE6DD"/>
    </linearGradient>
    <radialGradient id="glowTeal" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#53E8D4" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#53E8D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBlue" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2F5FA8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#2F5FA8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vega" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#EAF8FF"/>
      <stop offset="0.4" stop-color="#9BE9F7" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#53E8D4" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="380" fill="url(#bg)"/>
  <ellipse cx="980" cy="40" rx="520" ry="320" fill="url(#glowTeal)"/>
  <ellipse cx="120" cy="330" rx="460" ry="300" fill="url(#glowBlue)"/>

  <!-- perspective grid floor (depth) -->
  <g stroke="#2A4A63" stroke-width="1" opacity="0.5">
    <path d="M0 300 L1200 300" stroke-opacity="0.25"/>
    <path d="M-200 380 L560 300 M-40 380 L588 300 M180 380 L616 300 M440 380 L644 300 M760 380 L672 300 M1120 380 L700 300 M1500 380 L728 300"/>
    <path d="M0 320 L1200 320" stroke-opacity="0.4"/>
    <path d="M-120 348 L1320 348" stroke-opacity="0.3"/>
    <path d="M-260 380 L1460 380" stroke-opacity="0.2"/>
  </g>

  <!-- twinkling stars -->
  <g fill="#7FB0C8">
    <circle cx="150" cy="60" r="1.6"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="470" cy="44" r="1.3"><animate attributeName="opacity" values="1;0.2;1" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="740" cy="70" r="1.8" fill="#53E8D4"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="1040" cy="52" r="1.4"><animate attributeName="opacity" values="0.5;1;0.5" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="1130" cy="150" r="1.5"><animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="70" cy="200" r="1.3"><animate attributeName="opacity" values="0.4;1;0.4" dur="4.4s" repeatCount="indefinite"/></circle>
    <circle cx="620" cy="120" r="1.2" fill="#53E8D4"><animate attributeName="opacity" values="0.6;1;0.6" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="130" r="1.3"><animate attributeName="opacity" values="1;0.4;1" dur="3.4s" repeatCount="indefinite"/></circle>
  </g>

  <!-- floating wireframe cubes (isometric depth) -->
  <g stroke-linecap="round" fill="none" opacity="0.85">
    <g transform="translate(1010,170)" stroke="#53E8D4" stroke-width="1.6">
      <animateTransform attributeName="transform" type="translate" values="1010 170;1010 158;1010 170" dur="6s" repeatCount="indefinite"/>
      <path d="M0 -30 L26 -15 L26 15 L0 30 L-26 15 L-26 -15 Z" opacity="0.9"/>
      <path d="M-26 -15 L0 0 L26 -15 M0 0 L0 30" opacity="0.7"/>
    </g>
    <g transform="translate(830,250)" stroke="#3D7DBF" stroke-width="1.4">
      <animateTransform attributeName="transform" type="translate" values="830 250;830 240;830 250" dur="7.5s" repeatCount="indefinite"/>
      <path d="M0 -20 L18 -10 L18 10 L0 20 L-18 10 L-18 -10 Z" opacity="0.8"/>
      <path d="M-18 -10 L0 0 L18 -10 M0 0 L0 20" opacity="0.6"/>
    </g>
    <g transform="translate(1120,260)" stroke="#4FC7DE" stroke-width="1.2">
      <animateTransform attributeName="transform" type="translate" values="1120 260;1120 252;1120 260" dur="5.2s" repeatCount="indefinite"/>
      <rect x="-14" y="-14" width="28" height="28" transform="rotate(20)" opacity="0.6"/>
    </g>
  </g>

  <!-- orbit ring landmark -->
  <g transform="translate(690,300)" opacity="0.5">
    <ellipse cx="0" cy="0" rx="150" ry="46" fill="none" stroke="#2F6E7A" stroke-width="1.2"/>
    <circle r="4" fill="#53E8D4">
      <animateMotion dur="9s" repeatCount="indefinite" path="M150 0 A150 46 0 1 1 -150 0 A150 46 0 1 1 150 0"/>
    </circle>
  </g>

  <!-- ================= constellation logo (left) ================= -->
  <g transform="translate(70,44) scale(0.62)">
    <circle cx="244" cy="134" r="150" fill="url(#glowTeal)"/>
    <!-- Lyra lines (drawn) -->
    <g stroke="url(#teal2blue)" stroke-width="7" stroke-linecap="round" fill="none">
      <path d="M244 134 L191 194 L225 236 L321 270 L287 378 L191 344 L225 236">
        <animate attributeName="stroke-dasharray" values="0 900;900 0" dur="2.2s" fill="freeze"/>
      </path>
    </g>
    <!-- nodes -->
    <g>
      <circle cx="191" cy="194" r="11" fill="#0E1B2A" stroke="#53E8D4" stroke-width="5"/>
      <circle cx="225" cy="236" r="11" fill="#0E1B2A" stroke="#53E8D4" stroke-width="5"/>
      <circle cx="321" cy="270" r="12" fill="#0E1B2A" stroke="#4FC7DE" stroke-width="5"/>
      <circle cx="287" cy="378" r="11" fill="#0E1B2A" stroke="#3D7DBF" stroke-width="5"/>
      <circle cx="191" cy="344" r="11" fill="#0E1B2A" stroke="#3D7DBF" stroke-width="5"/>
    </g>
    <!-- Vega glow + star -->
    <circle cx="244" cy="134" r="60" fill="url(#vega)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="244" cy="134" r="16" fill="#EAF8FF"/>
    <path d="M244 92 L251 127 L286 134 L251 141 L244 176 L237 141 L202 134 L237 127 Z" fill="#EAF8FF" opacity="0.92"/>
  </g>

  <!-- ================= wordmark + tagline (right) ================= -->
  <text x="410" y="150" font-family="Verdana, Segoe UI, Arial, sans-serif" font-size="82" font-weight="800" fill="url(#word)" letter-spacing="4">DEPLYRA</text>
  <rect x="414" y="176" width="150" height="6" rx="3" fill="url(#teal2blue)"/>

  <text x="416" y="222" font-family="Consolas, Courier New, monospace" font-size="20" fill="#B7D6E4" letter-spacing="0.5">build it as code · ship it with GitOps · run it to SLOs</text>

  <text x="416" y="268" font-family="Consolas, Courier New, monospace" font-size="14.5" fill="#53E8D4" letter-spacing="4">DEVOPS · DEVSECOPS · DEVNETOPS · PLATFORM · CLOUD · GRC</text>

  <!-- status chip -->
  <g transform="translate(416,296)">
    <rect x="0" y="0" width="290" height="30" rx="15" fill="#0C2530" stroke="#1E5A5A" stroke-width="1"/>
    <circle cx="20" cy="15" r="5" fill="#34D399"><animate attributeName="opacity" values="1;0.35;1" dur="2s" repeatCount="indefinite"/></circle>
    <text x="36" y="20" font-family="Consolas, Courier New, monospace" font-size="12.5" fill="#CFE7DF" letter-spacing="0.5">All systems operational — available for new work</text>
  </g>

  <!-- premium frame + corner ticks -->
  <rect x="2" y="2" width="1196" height="376" rx="14" fill="none" stroke="#274863" stroke-width="1.5" opacity="0.7"/>
  <g stroke="#53E8D4" stroke-width="2" opacity="0.8">
    <path d="M24 14 h20 M24 14 v20"/>
    <path d="M1176 14 h-20 M1176 14 v20"/>
    <path d="M24 366 h20 M24 366 v-20"/>
    <path d="M1176 366 h-20 M1176 366 v-20"/>
  </g>
</svg>
