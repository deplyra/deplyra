<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="line" x1="191" y1="378" x2="256" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3D7DBF"/>
      <stop offset="1" stop-color="#53E8D4"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#53E8D4" stop-opacity="0.55"/>
      <stop offset="0.6" stop-color="#53E8D4" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#53E8D4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="104" fill="#0E1B2A"/>

  <!-- faint background stars -->
  <g fill="#3D5A75">
    <circle cx="120" cy="120" r="3"/>
    <circle cx="400" cy="150" r="2.5"/>
    <circle cx="380" cy="400" r="3"/>
    <circle cx="120" cy="420" r="2.5"/>
    <circle cx="330" cy="96" r="2"/>
    <circle cx="90" cy="270" r="2"/>
    <circle cx="422" cy="290" r="2"/>
  </g>

  <!-- Vega glow -->
  <circle cx="244" cy="134" r="86" fill="url(#glow)"/>

  <!-- constellation lines (Lyra) -->
  <g stroke="url(#line)" stroke-width="7" stroke-linecap="round" fill="none">
    <path d="M244 134 L191 194 L225 236 L321 270 L287 378 L191 344 L225 236"/>
  </g>

  <!-- nodes -->
  <g>
    <circle cx="191" cy="194" r="11" fill="#0E1B2A" stroke="#53E8D4" stroke-width="5"/>
    <circle cx="225" cy="236" r="11" fill="#0E1B2A" stroke="#53E8D4" stroke-width="5"/>
    <circle cx="321" cy="270" r="12" fill="#0E1B2A" stroke="#4FC7DE" stroke-width="5"/>
    <circle cx="287" cy="378" r="11" fill="#0E1B2A" stroke="#3D7DBF" stroke-width="5"/>
    <circle cx="191" cy="344" r="11" fill="#0E1B2A" stroke="#3D7DBF" stroke-width="5"/>
  </g>

  <!-- Vega: the production star -->
  <circle cx="244" cy="134" r="16" fill="#EAF8FF"/>
  <path d="M244 92 L251 127 L286 134 L251 141 L244 176 L237 141 L202 134 L237 127 Z" fill="#EAF8FF" opacity="0.9"/>
